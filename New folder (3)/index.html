<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JIBSON Web App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- Dashboard Header -->
    <header>
      <h1>⚡ JIBSON Portal</h1>
      <p>Welcome! Select a service below.</p>
    </header>

    <!-- Navigation Tabs -->
    <nav class="tabs">
      <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
      <button class="tab-btn" data-tab="airtime">Airtime Purchase</button>
      <button class="tab-btn" data-tab="bill">Electricity Bill</button>
      <button class="tab-btn" data-tab="data">Data Purchase</button>
    </nav>

    <!-- Dashboard Tab -->
    <section id="dashboard" class="tab-content active">
      <h2>📊 Dashboard</h2>
      <p>Current balance: ₦0.00</p>
      <p>Transactions: 0</p>
      <button onclick="showForm('airtime')">Buy Airtime</button>
      <button onclick="showForm('bill')">Pay Bill</button>
      <button onclick="showForm('data')">Buy Data</button>
    </section>

    <!-- Airtime Purchase Form -->
    <section id="airtime" class="tab-content">
      <h2>📞 Airtime Purchase</h2>
      <form id="airtimeForm" onsubmit="submitAirtime(event)">
        <label for="network">Network:</label>
        <select id="network" required>
          <option value="">Select Network</option>
          <option value="MTN">MTN</option>
          <option value="Airtel">Airtel</option>
          <option value="Glo">Glo</option>
          <option value="9Mobile">9Mobile</option>
        </select>

        <label for="amount">Amount (₦):</label>
        <input type="number" id="amount" min="10" required />

        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" placeholder="08012345678" required />

        <button type="submit">Purchase Airtime</button>
      </form>
    </section>

    <!-- Electricity Bill Payment Form -->
    <section id="bill" class="tab-content">
      <h2>💡 Electricity Bill Payment</h2>
      <form id="billForm" onsubmit="submitBill(event)">
        <label for="meter">Meter Number:</label>
        <input type="text" id="meter" placeholder="Enter meter number" required />

        <label for="amountBill">Amount (₦):</label>
        <input type="number" id="amountBill" min="100" required />

        <label for="billType">Bill Type:</label>
        <select id="billType" required>
          <option value="">Select Type</option>
          <option value="prepaid">Prepaid</option>
          <option value="postpaid">Postpaid</option>
        </select>

        <button type="submit">Pay Bill</button>
      </form>
    </section>

    <!-- Data Purchase Form -->
    <section id="data" class="tab-content">
      <h2>📱 Data Purchase</h2>
      <form id="dataForm" onsubmit="submitData(event)">
        <label for="dataNetwork">Network:</label>
        <select id="dataNetwork" required>
          <option value="">Select Network</option>
          <option value="MTN">MTN</option>
          <option value="Airtel">Airtel</option>
          <option value="Glo">Glo</option>
          <option value="9Mobile">9Mobile</option>
        </select>

        <label for="dataPlan">Data Plan:</label>
        <select id="dataPlan" required>
          <option value="">Select Plan</option>
          <option value="1GB-1day">1GB - 1 Day</option>
          <option value="2GB-3days">2GB - 3 Days</option>
          <option value="5GB-7days">5GB - 7 Days</option>
          <option value="10GB-14days">10GB - 14 Days</option>
        </select>

        <label for="dataPhone">Phone Number:</label>
        <input type="tel" id="dataPhone" placeholder="08012345678" required />

        <button type="submit">Buy Data</button>
      </form>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
